name: sge_sena_desktop
description: Aplicación de escritorio Flutter para gestión de equipos SGE-SENA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI y Material
  cupertino_icons: ^1.0.6
  
  # HTTP y Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # Almacenamiento local
  shared_preferences: ^2.2.2
  
  # Información del dispositivo
  device_info_plus: ^9.1.1
  
  # Control de ventana (para bloqueo de pantalla)
  window_manager: ^0.3.7
  
  # Utilidades
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

