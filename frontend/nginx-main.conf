# Configuración principal de Nginx
# Este archivo reemplaza /etc/nginx/nginx.conf

# Limitar procesos worker para optimizar recursos
worker_processes 1;
daemon off;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolver DNS para resolver nombres de host (necesario para proxy_pass con variables)
    # 127.0.0.11 es el resolver DNS interno de Docker
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Incluir configuraciones de servidores virtuales
    include /etc/nginx/conf.d/*.conf;
}

