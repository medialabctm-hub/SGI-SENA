# Configuración del servidor virtual para producción
# Este archivo se incluye en /etc/nginx/conf.d/default.conf

# Rate limiting básico
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

server {
    listen 80;
    # Aceptar conexiones por IP y dominio (preparado para futuro)
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logs de acceso y error
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Proxy para API (debe estar ANTES de location /)
    # En producción con docker-compose, el backend está en la red Docker
    # Usar el nombre del servicio 'backend' para comunicación interna
    set $api_backend http://backend:3000;
    location /api {
        # Rate limiting para API
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy para uploads (debe estar ANTES de location /)
    # Usar ^~ para que tenga precedencia sobre las ubicaciones regex
    location ^~ /uploads {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración para archivos grandes (imágenes, etc.)
        # Deshabilitar buffering para streaming directo (mejor para archivos grandes)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts para archivos grandes
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # Cache para archivos estáticos (excluir /uploads para que se proxy al backend)
    # El regex excluye rutas que empiezan con /uploads
    location ~* ^(?!/uploads).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check del backend (para Docker health check)
    location /health {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Configuración para SPA (Single Page Application)
    # Esta debe estar AL FINAL para capturar todas las rutas que no sean /api o /uploads
    location / {
        # Rate limiting general
        limit_req zone=general_limit burst=50 nodelay;
        
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de seguridad mejorados
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Ocultar versión de nginx
    server_tokens off;
    
    # Deshabilitar métodos HTTP no necesarios
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$ ) {
        return 405;
    }
}

