# Configuración del servidor virtual
# Este archivo se incluye en /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo del cuerpo (subida de imágenes/archivos). Por defecto nginx usa 1m.
    client_max_body_size 15M;

    # Proxy para API (debe estar ANTES de location /)
    # Por defecto apunta a localhost:3000 (backend en el mismo contenedor)
    # Usar 127.0.0.1 en lugar de localhost para evitar problemas de resolución DNS
    set $api_backend http://127.0.0.1:3000;
    location /api {
        client_max_body_size 15M;
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Proxy para uploads (debe estar ANTES de location /)
    # Usar ^~ para que tenga precedencia sobre las ubicaciones regex
    location ^~ /uploads {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración para archivos grandes (imágenes, etc.)
        # Deshabilitar buffering para streaming directo (mejor para archivos grandes)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts para archivos grandes
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # Cache para archivos estáticos (excluir /uploads para que se proxy al backend)
    # El regex excluye rutas que empiezan con /uploads
    location ~* ^(?!/uploads).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check del backend (para Docker health check)
    location /health {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Configuración para SPA (Single Page Application)
    # Esta debe estar AL FINAL para capturar todas las rutas que no sean /api o /uploads
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

