version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: sge-sena-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-GestionEquipo}
      MYSQL_USER: ${DB_USER:-sge_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sge_password}
    # NO exponer puerto 3306 externamente en producción (solo acceso interno)
    # ports:
    #   - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./BD/SGI_SENA.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sge-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sge-sena-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER:-sge_user}
      DB_PASSWORD: ${DB_PASSWORD:-sge_password}
      DB_NAME: ${DB_NAME:-GestionEquipo}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      COOKIE_SECRET: ${COOKIE_SECRET:-your-cookie-secret-change-in-production}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-gse-app}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gse-users}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    # Backend solo accesible internamente (a través de nginx)
    # No exponer puerto 3000 externamente en producción
    # ports:
    #   - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sge-sena-frontend
    restart: unless-stopped
    environment:
      # API_URL se usa para configurar el proxy de nginx
      # En producción, el backend está en la misma red Docker
      API_URL: ${API_URL:-http://backend:3000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - sge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sge-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local

